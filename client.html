<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Recherche Client</title>
  </head>
  <body>
    <h1>Recherche Client</h1>

    <div style="display: flex; gap: 10px; align-items: center">
      <input
        type="text"
        id="clientId"
        placeholder="Entrer ID client"
        style="
          flex: 1;
          padding: 8px;
          border: 1px solid #ccc;
          border-radius: 5px;
        "
      />
      <button
        id="searchBtn"
        style="
          background: #4caf50;
          color: white;
          border: none;
          padding: 8px 15px;
          cursor: pointer;
          border-radius: 5px;
        "
      >
        🔍 Rechercher
      </button>
    </div>

    <div id="result"></div>

    <h2>Créer un client</h2>

    <div
      style="display: flex; flex-direction: column; gap: 10px; max-width: 400px"
    >
      <input
        type="text"
        id="nom"
        placeholder="Nom du client"
        style="padding: 8px; border: 1px solid #ccc; border-radius: 5px"
      />
      <input
        type="tel"
        id="telephone"
        placeholder="Téléphone (ex: 0612345678)"
        style="padding: 8px; border: 1px solid #ccc; border-radius: 5px"
      />

      <div style="display: flex; gap: 10px">
        <button
          type="button"
          id="addClientBtn"
          style="
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            flex: 1;
          "
        >
          ✅ Ajouter le client
        </button>
      </div>
    </div>

    <p id="message"></p>

    <h2>Faire une vente</h2>

    <input type="text" id="venteClientId" placeholder="ID du client" />
    <p id="clientInfo"></p>

    <select id="produit">
      <option value="Casier bière">Casier bière - 25€</option>
      <option value="Caisse de vin">Caisse de vin - 45€</option>
      <option value="Pack whisky">Pack whisky - 60€</option>
      <option value="Carton de soda">Carton de soda - 15€</option>
      <option value="Pack de bières artisanales">
        Pack de bières artisanales - 35€
      </option>
    </select>

    <input
      type="number"
      id="quantite"
      placeholder="Quantité"
      min="1"
      value="1"
    />
    <input
      type="number"
      id="prix"
      placeholder="Prix unitaire"
      step="0.01"
      readonly
    />

    <button type="button" id="addVenteBtn">Enregistrer vente</button>

    <p id="venteMessage"></p>

    <h2>Historique des ventes</h2>

    <div
      style="
        display: flex;
        gap: 10px;
        align-items: center;
        max-width: 500px;
        margin-bottom: 10px;
      "
    >
      <input
        type="text"
        id="historiqueClientId"
        placeholder="ID du client"
        style="
          flex: 1;
          padding: 8px;
          border: 1px solid #ccc;
          border-radius: 5px;
        "
      />
      <button
        type="button"
        id="showHistoriqueBtn"
        style="
          background: #4caf50;
          color: white;
          border: none;
          padding: 8px 15px;
          cursor: pointer;
          border-radius: 5px;
        "
      >
        🔍 Afficher l'historique
      </button>
    </div>

    <div id="historiqueMessage"></div>

    <table
      id="historiqueTable"
      border="1"
      style="
        width: 100%;
        margin-top: 10px;
        display: none;
        border-collapse: collapse;
      "
    >
      <thead style="background-color: #4caf50; color: white">
        <tr>
          <th style="padding: 10px">ID Vente</th>
          <th style="padding: 10px">Produit</th>
          <th style="padding: 10px">Quantité</th>
          <th style="padding: 10px">Prix unitaire</th>
          <th style="padding: 10px">Total</th>
          <th style="padding: 10px">Date</th>
          <th style="padding: 10px">Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot style="background-color: #f5f5f5; font-weight: bold">
        <tr>
          <td colspan="2"><strong>📊 Total général</strong></td>
          <td id="totalQuantite" style="text-align: right">0</td>
          <td></td>
          <td id="totalPrix" style="text-align: right">0€</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
    <script src="client.js"></script>
  </body>
</html>
