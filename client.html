<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Recherche Client</title>
  </head>
  <body>
    <h1>Recherche Client</h1>

    <input type="text" id="clientId" placeholder="Entrer ID client" />
    <button id="searchBtn">Rechercher</button>

    <div id="result"></div>

    <h2>Créer un client</h2>

    <input type="text" id="nom" placeholder="Nom du client" />
    <input type="text" id="telephone" placeholder="Téléphone" />

    <button type="button" id="addClientBtn">Ajouter</button>

    <p id="message"></p>

    <h2>Faire une vente</h2>

    <input type="number" id="venteClientId" placeholder="ID du client" />

    <p id="clientInfo"></p>
    <!-- ✅ ICI -->

    <select id="produit">
      <option value="Casier bière">Casier bière</option>
    </select>

    <input type="number" id="quantite" placeholder="Quantité" />
    <input type="number" id="prix" placeholder="Prix unitaire" />

    <button type="button" id="addVenteBtn">Enregistrer vente</button>

    <p id="venteMessage"></p>

    <h2>Historique des ventes</h2>

    <input type="number" id="historiqueClientId" placeholder="ID du client" />
    <button type="button" id="showHistoriqueBtn">Afficher l'historique</button>

    <div id="historiqueMessage"></div>
    <table
      id="historiqueTable"
      border="1"
      style="width: 100%; margin-top: 10px; display: none"
    >
      <thead>
        <tr>
          <th>ID Vente</th>
          <th>Produit</th>
          <th>Quantité</th>
          <th>Prix unitaire</th>
          <th>Total</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
      <tfoot>
        <tr>
          <td colspan="2"><strong>Total général</strong></td>
          <td id="totalQuantite">0</td>
          <td></td>
          <td id="totalPrix">0$</td>
          <td></td>
        </tr>
      </tfoot>
    </table>

    <script src="client.js"></script>
  </body>
</html>
